name: Deploy to CoreServer
on:
  push:
    branches:
      - main
  workflow_dispatch:
jobs:
  deploy:
    name: Build and Deploy to CoreServer
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          run_install: false
      - name: Get pnpm store directory
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT
        id: pnpm-cache
      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build Next.js static export
        run: pnpm build
      - name: Install rsync
        run: sudo apt-get update && sudo apt-get install -y rsync
      - name: Install ssh key and deploy via rsync
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SFTP_HOST: ${{ secrets.SFTP_HOST }}
          SFTP_USER: ${{ secrets.SFTP_USER }}
          SFTP_PORT: ${{ secrets.SFTP_PORT }}
          SOURCE: "tsutsumin-portfolio/.next/static-export/"
          TARGET: "/home/kuraryu/public_html/www.kuraryu.jp/"
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          echo "Runner public IP: $(curl -fsSL https://api.ipify.org || true)"
          ssh-keyscan -p "$SFTP_PORT" -H "$SFTP_HOST" >> ~/.ssh/known_hosts || true

          echo "Debug: Source directory contents:"
          ls -la "$SOURCE"
          echo "File count: $(find $SOURCE -type f | wc -l)"
          ssh -i ~/.ssh/deploy_key -p "$SFTP_PORT" -o StrictHostKeyChecking=no \
            "$SFTP_USER@$SFTP_HOST" "echo 'SSH connection successful'"
          rsync -avz --delete --timeout=60 \
            -e "ssh -i ~/.ssh/deploy_key -p $SFTP_PORT -o StrictHostKeyChecking=no" \
            "$SOURCE" "$SFTP_USER@$SFTP_HOST:$TARGET"
