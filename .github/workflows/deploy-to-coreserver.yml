name: Deploy to CoreServer
on:
  push:
    branches:
      - main
  workflow_dispatch:
jobs:
  deploy:
    name: Build and Deploy to CoreServer
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          run_install: false
      - name: Get pnpm store directory
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT
        id: pnpm-cache
      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build Next.js static export
        run: pnpm build
      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp
      - name: Deploy via FTP
        env:
          SFTP_HOST: ${{ secrets.SFTP_HOST }}
          SFTP_USER: ${{ secrets.SFTP_USER }}
          SFTP_PASSWORD: ${{ secrets.SFTP_PASSWORD }}
          FTP_PORT: ${{ secrets.FTP_PORT }}
          SOURCE: "tsutsumin-portfolio/.next/static-export/"
          WWW_TARGET: ${{ secrets.FTP_WWW_TARGET }}
          APEX_TARGET: ${{ secrets.FTP_APEX_TARGET }}
        run: |
          echo "Debug: Source directory contents:"
          ls -la "$SOURCE"
          echo "File count: $(find $SOURCE -type f | wc -l)"

          emit_site_mirror_commands() {
            target="$1"

            if [ -z "$target" ]; then
              return
            fi

            printf 'mkdir -p "%s"\n' "$target"

            # The CoreServer web root also hosts standalone sub-sites such as
            # /Happa and /long-long-url. Do not deletion-sync the whole root.
            for app_dir in _next static; do
              if [ -d "$SOURCE$app_dir" ]; then
                printf 'mkdir -p "%s/%s"\n' "$target" "$app_dir"
                printf 'mirror --reverse --delete --verbose "%s%s/" "%s/%s/"\n' "$SOURCE" "$app_dir" "$target" "$app_dir"
              fi
            done

            printf 'mirror --reverse --verbose "%s" "%s"\n' "$SOURCE" "$target"
          }

          {
            echo "set cmd:fail-exit yes"
            echo "set ftp:ssl-allow true"
            echo "set ssl:verify-certificate false"
            echo "set net:timeout 30"
            echo "set net:max-retries 3"
            emit_site_mirror_commands "$WWW_TARGET"
            emit_site_mirror_commands "$APEX_TARGET"
            echo "bye"
          } > .deploy-lftp

          lftp -u "$SFTP_USER","$SFTP_PASSWORD" -p "$FTP_PORT" "$SFTP_HOST" < .deploy-lftp
