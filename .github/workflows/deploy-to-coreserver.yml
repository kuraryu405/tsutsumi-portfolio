name: Deploy to CoreServer
on:
  push:
    branches:
      - main
  workflow_dispatch:
jobs:
  deploy:
    name: Build and Deploy to CoreServer
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          run_install: false
      - name: Get pnpm store directory
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT
        id: pnpm-cache
      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build Next.js static export
        run: pnpm build
      - name: Install rsync
        run: sudo apt-get update && sudo apt-get install -y rsync
      - name: Install ssh key and deploy via rsync
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SFTP_HOST: ${{ secrets.SFTP_HOST }}
          SFTP_USER: ${{ secrets.SFTP_USER }}
          SFTP_PORT: ${{ secrets.SFTP_PORT }}
          CORESERVER_API_KEY: ${{ secrets.CORESERVER_API_KEY }}
          CORESERVER_ACCOUNT: "kuraryu"
          CORESERVER_SERVER_NAME: "m34.coreserver.jp"
          SOURCE: "tsutsumin-portfolio/.next/static-export/"
          WWW_TARGET: "public_html/www.kuraryu.jp/"
          APEX_TARGET: "public_html/kuraryu.jp/"
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          RUNNER_IP="$(curl -fsSL https://api.ipify.org)"
          echo "Runner public IP: $RUNNER_IP"
          ALLOW_RESPONSE="$(
            curl -fsS --retry 5 --retry-all-errors --retry-delay 5 \
              -H "Content-Type: application/x-www-form-urlencoded" \
              -X POST "https://api.coreserver.jp/v1/tool/ssh_ip_allow" \
              --data-urlencode "account=$CORESERVER_ACCOUNT" \
              --data-urlencode "server_name=$CORESERVER_SERVER_NAME" \
              --data-urlencode "api_secret_key=$CORESERVER_API_KEY" \
              --data-urlencode "param[addr]=$RUNNER_IP"
          )"
          echo "CoreServer SSH IP allow response: $ALLOW_RESPONSE"
          echo "$ALLOW_RESPONSE" | grep -q '"status_code":200'
          echo "Waiting for CoreServer SSH IP allow propagation..."
          sleep 300

          ssh-keyscan -p "$SFTP_PORT" -H "$SFTP_HOST" >> ~/.ssh/known_hosts || true

          echo "Debug: Source directory contents:"
          ls -la "$SOURCE"
          echo "File count: $(find $SOURCE -type f | wc -l)"
          ssh -i ~/.ssh/deploy_key -p "$SFTP_PORT" -o StrictHostKeyChecking=no \
            "$SFTP_USER@$SFTP_HOST" "mkdir -p '$WWW_TARGET' '$APEX_TARGET' && echo 'SSH connection successful'"
          rsync -avz --delete --timeout=60 \
            -e "ssh -i ~/.ssh/deploy_key -p $SFTP_PORT -o StrictHostKeyChecking=no" \
            "$SOURCE" "$SFTP_USER@$SFTP_HOST:$WWW_TARGET"
          rsync -avz --delete --timeout=60 \
            -e "ssh -i ~/.ssh/deploy_key -p $SFTP_PORT -o StrictHostKeyChecking=no" \
            "$SOURCE" "$SFTP_USER@$SFTP_HOST:$APEX_TARGET"
