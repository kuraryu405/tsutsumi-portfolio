name: Deploy to CoreServer
on:
  push:
    branches:
      - main
jobs:
  deploy:
    name: Build and Deploy to CoreServer
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          run_install: false
      - name: Get pnpm store directory
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT
        id: pnpm-cache
      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build Next.js static export
        run: pnpm build
      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp
      - name: Deploy via SFTP
        env:
          SFTP_HOST: ${{ secrets.SFTP_HOST }}
          SFTP_USER: ${{ secrets.SFTP_USER }}
          SFTP_PASSWORD: ${{ secrets.SFTP_PASSWORD }}
          SFTP_PORT: ${{ secrets.SFTP_PORT }}
          SOURCE: "tsutsumin-portfolio/.next/static-export/"
          TARGET: "/home/kuraryu/public_html/www.kuraryu.jp/"
        run: |
          echo "Debug: Listing source directory..."
          ls -la "$SOURCE"
          echo "Debug: File count in source:"
          find "$SOURCE" -type f | wc -l
          echo "Debug: Connecting to SFTP..."
          lftp -e "set sftp:connect-program 'ssh -o StrictHostKeyChecking=no -p $SFTP_PORT'; set net:timeout 60; set net:reconnect-interval-base 10; set net:max-retries 5; mirror -R --delete --verbose $SOURCE $TARGET; bye" -u "$SFTP_USER","$SFTP_PASSWORD" sftp://"$SFTP_HOST"
