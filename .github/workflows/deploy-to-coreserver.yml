name: Deploy to CoreServer
on:
  push:
    branches:
      - main
jobs:
  deploy:
    name: Build and Deploy to CoreServer
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          run_install: false
      - name: Get pnpm store directory
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT
        id: pnpm-cache
      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build Next.js static export
        run: pnpm build
      - name: Deploy via rsync over SSH
        uses: easingthemes/ssh-deploy@main
        env:
          SSH_PRIVATE_KEY: ""
          SOURCE: "tsutsumin-portfolio/.next/static-export/"
          REMOTE_HOST: ${{ secrets.SFTP_HOST }}
          REMOTE_USER: ${{ secrets.SFTP_USER }}
          REMOTE_PORT: ${{ secrets.SFTP_PORT }}
          REMOTE_PASSWORD: ${{ secrets.SFTP_PASSWORD }}
          TARGET: "/home/kuraryu/public_html/www.kuraryu.jp/"
          SCRIPT_BEFORE: |
            echo "Source directory contents:"
            ls -la $SOURCE
            echo "File count:"
            find $SOURCE -type f | wc -l
          SSH_KNOWN_HOSTS: "false"
          SSH_ARGS: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ConnectTimeout=30 -o ServerAliveInterval=30 -o ServerAliveCountMax=3"
          ARGS: "-avz --delete --exclude '.next/cache' --timeout=30 --contimeout=30"
